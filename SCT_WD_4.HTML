<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - To-Do</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .task-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .completed .task-text {
            text-decoration: line-through;
            opacity: 0.7;
        }
        
        .due-soon {
            color: #f59e0b;
        }
        
        .overdue {
            color: #ef4444;
        }
    </style>
</head>
<body class="h-full bg-gray-50 flex">
    <div class="max-w-4xl mx-auto w-full h-full flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-2xl flex items-center justify-center text-white font-bold text-xl">
                    ✓
                </div>
                <div>
                    <h1 class="text-2xl font-semibold text-gray-900">TaskFlow</h1>
                    <p class="text-xs text-gray-500">Stay organized • Get things done</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex bg-gray-100 rounded-full p-1 text-sm">
                    <button onclick="filterTasks('all')" id="filter-all"
                            class="filter-btn px-5 py-1.5 rounded-full font-medium active">All</button>
                    <button onclick="filterTasks('active')" id="filter-active"
                            class="filter-btn px-5 py-1.5 rounded-full font-medium">Active</button>
                    <button onclick="filterTasks('completed')" id="filter-completed"
                            class="filter-btn px-5 py-1.5 rounded-full font-medium">Done</button>
                </div>
                
                <div class="text-sm text-gray-500">
                    <span id="task-count" class="font-semibold text-gray-700">0</span> tasks
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <div class="w-72 bg-white border-r border-gray-200 p-6 flex flex-col">
                <div class="mb-6">
                    <button onclick="showNewListModal()"
                            class="w-full flex items-center justify-center gap-2 bg-violet-600 hover:bg-violet-700 text-white py-3 px-4 rounded-2xl font-medium transition">
                        <i class="fas fa-plus"></i>
                        <span>New List</span>
                    </button>
                </div>
                
                <div class="text-xs uppercase tracking-widest text-gray-400 mb-3">My Lists</div>
                <div id="lists-container" class="flex-1 space-y-1 overflow-auto">
                    <!-- Populated by JS -->
                </div>
                
                <div class="mt-auto pt-6 border-t">
                    <div class="text-xs text-gray-400 mb-2">Stats</div>
                    <div class="grid grid-cols-2 gap-3 text-center">
                        <div class="bg-gray-50 rounded-2xl p-3">
                            <div id="completed-count" class="text-2xl font-semibold text-emerald-600">0</div>
                            <div class="text-xs text-gray-500">Completed</div>
                        </div>
                        <div class="bg-gray-50 rounded-2xl p-3">
                            <div id="pending-count" class="text-2xl font-semibold text-amber-600">0</div>
                            <div class="text-xs text-gray-500">Pending</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasks Area -->
            <div class="flex-1 flex flex-col">
                <!-- Add Task Bar -->
                <div class="p-6 border-b bg-white">
                    <div class="flex gap-3">
                        <input id="task-input" 
                               type="text"
                               placeholder="What needs to be done?"
                               class="flex-1 px-5 py-4 bg-gray-100 border border-transparent focus:border-violet-300 focus:bg-white rounded-3xl outline-none text-lg">
                        
                        <input id="due-date" 
                               type="datetime-local"
                               class="px-5 py-4 bg-gray-100 border border-transparent focus:border-violet-300 focus:bg-white rounded-3xl outline-none">
                        
                        <button onclick="addTask()"
                                class="bg-violet-600 hover:bg-violet-700 text-white px-8 rounded-3xl font-medium flex items-center gap-2">
                            <i class="fas fa-plus"></i>
                            Add
                        </button>
                    </div>
                </div>

                <!-- Tasks List -->
                <div class="flex-1 overflow-auto p-6" id="tasks-container">
                    <!-- Tasks populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-md mx-4 overflow-hidden">
            <div class="p-6 border-b">
                <h3 class="font-semibold text-xl">Edit Task</h3>
            </div>
            
            <div class="p-6 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Task</label>
                    <input id="edit-task-text" 
                           class="w-full px-5 py-4 bg-gray-100 rounded-3xl outline-none focus:border-violet-400">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-2">Due Date & Time</label>
                    <input id="edit-due-date" 
                           type="datetime-local"
                           class="w-full px-5 py-4 bg-gray-100 rounded-3xl outline-none">
                </div>
            </div>
            
            <div class="flex border-t">
                <button onclick="closeEditModal()" 
                        class="flex-1 py-5 text-gray-500 font-medium hover:bg-gray-100 transition">
                    Cancel
                </button>
                <button onclick="saveEditedTask()" 
                        class="flex-1 py-5 bg-violet-600 text-white font-medium hover:bg-violet-700 transition">
                    Save Changes
                </button>
            </div>
        </div>
    </div>

    <!-- New List Modal -->
    <div id="new-list-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-sm mx-4 p-6">
            <h3 class="font-semibold text-xl mb-6">Create New List</h3>
            
            <input id="new-list-name" 
                   type="text" 
                   placeholder="List name (e.g. Work, Personal)"
                   class="w-full px-5 py-4 bg-gray-100 rounded-3xl outline-none mb-6">
            
            <div class="flex gap-3">
                <button onclick="closeNewListModal()" 
                        class="flex-1 py-4 text-gray-500 font-medium hover:bg-gray-100 rounded-3xl">
                    Cancel
                </button>
                <button onclick="createNewList()" 
                        class="flex-1 py-4 bg-violet-600 text-white font-medium rounded-3xl">
                    Create List
                </button>
            </div>
        </div>
    </div>

    <script>
        // Data structure
        let currentListId = "default";
        let lists = {
            "default": {
                id: "default",
                name: "Main Tasks",
                tasks: []
            }
        };
        
        let currentFilter = "all";
        
        // Load from localStorage
        function loadData() {
            const savedData = localStorage.getItem("taskflow_data");
            if (savedData) {
                const parsed = JSON.parse(savedData);
                lists = parsed.lists || lists;
                currentListId = parsed.currentListId || "default";
            }
        }
        
        // Save to localStorage
        function saveData() {
            localStorage.setItem("taskflow_data", JSON.stringify({
                lists: lists,
                currentListId: currentListId
            }));
        }
        
        // Render lists in sidebar
        function renderLists() {
            const container = document.getElementById("lists-container");
            container.innerHTML = "";
            
            Object.values(lists).forEach(list => {
                const isActive = list.id === currentListId;
                
                const div = document.createElement("div");
                div.className = `group flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer transition ${isActive ? 'bg-violet-100 text-violet-700' : 'hover:bg-gray-100'}`;
                div.innerHTML = `
                    <i class="fas fa-list-ul text-lg ${isActive ? 'text-violet-600' : 'text-gray-400'}"></i>
                    <span class="font-medium flex-1">${list.name}</span>
                    <span class="text-xs bg-white px-2.5 py-1 rounded-full ${isActive ? 'text-violet-700' : 'text-gray-500'}">
                        ${list.tasks.length}
                    </span>
                `;
                div.onclick = () => {
                    currentListId = list.id;
                    renderLists();
                    renderTasks();
                };
                container.appendChild(div);
            });
        }
        
        // Render tasks
        function renderTasks() {
            const container = document.getElementById("tasks-container");
            container.innerHTML = "";
            
            const currentList = lists[currentListId];
            if (!currentList) return;
            
            let filteredTasks = currentList.tasks;
            
            if (currentFilter === "active") {
                filteredTasks = filteredTasks.filter(t => !t.completed);
            } else if (currentFilter === "completed") {
                filteredTasks = filteredTasks.filter(t => t.completed);
            }
            
            if (filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center py-20">
                        <div class="text-6xl mb-6 text-gray-200">📋</div>
                        <h3 class="text-xl font-medium text-gray-400">No tasks yet</h3>
                        <p class="text-gray-400 mt-2">Add a new task to get started</p>
                    </div>
                `;
                return;
            }
            
            filteredTasks.forEach((task, index) => {
                const taskEl = document.createElement("div");
                taskEl.className = `task-item bg-white border border-gray-200 rounded-3xl p-5 mb-4 flex gap-4 items-start ${task.completed ? 'completed' : ''}`;
                
                const dueDate = task.due ? new Date(task.due) : null;
                let dueHTML = "";
                
                if (dueDate) {
                    const now = new Date();
                    const isOverdue = dueDate < now && !task.completed;
                    const isSoon = !isOverdue && (dueDate - now) < (1000 * 60 * 60 * 24 * 2); // within 2 days
                    
                    dueHTML = `
                        <div class="text-xs mt-1 ${isOverdue ? 'overdue' : isSoon ? 'due-soon' : 'text-gray-400'}">
                            <i class="fas fa-clock"></i> 
                            ${dueDate.toLocaleDateString('en-IN', {month:'short', day:'numeric'})} 
                            ${dueDate.toLocaleTimeString('en-IN', {hour:'numeric', minute:'2-digit'})}
                        </div>
                    `;
                }
                
                taskEl.innerHTML = `
                    <div onclick="toggleComplete(${index})" 
                         class="w-7 h-7 mt-0.5 border-2 ${task.completed ? 'bg-emerald-500 border-emerald-500' : 'border-gray-300'} rounded-2xl flex items-center justify-center cursor-pointer hover:border-violet-400 transition">
                        ${task.completed ? '<i class="fas fa-check text-white text-sm"></i>' : ''}
                    </div>
                    
                    <div class="flex-1 min-w-0">
                        <div class="task-text font-medium text-gray-800 text-lg leading-tight mb-1">${task.text}</div>
                        ${dueHTML}
                    </div>
                    
                    <div class="flex flex-col items-end gap-2">
                        <button onclick="editTask(${index}); event.stopImmediatePropagation()" 
                                class="text-gray-400 hover:text-amber-500 transition p-2">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteTask(${index}); event.stopImmediatePropagation()" 
                                class="text-gray-400 hover:text-red-500 transition p-2">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                
                container.appendChild(taskEl);
            });
            
            updateStats();
        }
        
        function updateStats() {
            const currentList = lists[currentListId];
            if (!currentList) return;
            
            const completed = currentList.tasks.filter(t => t.completed).length;
            const total = currentList.tasks.length;
            
            document.getElementById("completed-count").textContent = completed;
            document.getElementById("pending-count").textContent = total - completed;
            document.getElementById("task-count").textContent = total;
        }
        
        function addTask() {
            const input = document.getElementById("task-input");
            const dueInput = document.getElementById("due-date");
            
            const text = input.value.trim();
            if (!text) return;
            
            const currentList = lists[currentListId];
            
            currentList.tasks.unshift({
                id: Date.now(),
                text: text,
                completed: false,
                due: dueInput.value || null,
                createdAt: new Date().toISOString()
            });
            
            input.value = "";
            dueInput.value = "";
            
            saveData();
            renderTasks();
        }
        
        function toggleComplete(index) {
            const currentList = lists[currentListId];
            currentList.tasks[index].completed = !currentList.tasks[index].completed;
            saveData();
            renderTasks();
        }
        
        function deleteTask(index) {
            if (confirm("Delete this task?")) {
                const currentList = lists[currentListId];
                currentList.tasks.splice(index, 1);
                saveData();
                renderTasks();
            }
        }
        
        let editingIndex = null;
        
        function editTask(index) {
            const currentList = lists[currentListId];
            const task = currentList.tasks[index];
            
            editingIndex = index;
            
            document.getElementById("edit-task-text").value = task.text;
            document.getElementById("edit-due-date").value = task.due || "";
            
            document.getElementById("edit-modal").classList.remove("hidden");
        }
        
        function saveEditedTask() {
            if (editingIndex === null) return;
            
            const currentList = lists[currentListId];
            currentList.tasks[editingIndex].text = document.getElementById("edit-task-text").value.trim();
            currentList.tasks[editingIndex].due = document.getElementById("edit-due-date").value || null;
            
            saveData();
            closeEditModal();
            renderTasks();
        }
        
        function closeEditModal() {
            document.getElementById("edit-modal").classList.add("hidden");
            editingIndex = null;
        }
        
        function filterTasks(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if ((filter === 'all' && btn.id === 'filter-all') ||
                    (filter === 'active' && btn.id === 'filter-active') ||
                    (filter === 'completed' && btn.id === 'filter-completed')) {
                    btn.classList.add('active', 'bg-white', 'shadow-sm');
                } else {
                    btn.classList.remove('active', 'bg-white', 'shadow-sm');
                }
            });
            
            renderTasks();
        }
        
        // New List
        function showNewListModal() {
            document.getElementById("new-list-modal").classList.remove("hidden");
            document.getElementById("new-list-name").focus();
        }
        
        function closeNewListModal() {
            document.getElementById("new-list-modal").classList.add("hidden");
        }
        
        function createNewList() {
            const nameInput = document.getElementById("new-list-name");
            const name = nameInput.value.trim();
            
            if (!name) return;
            
            const newListId = "list_" + Date.now();
            
            lists[newListId] = {
                id: newListId,
                name: name,
                tasks: []
            };
            
            currentListId = newListId;
            
            saveData();
            renderLists();
            renderTasks();
            closeNewListModal();
            nameInput.value = "";
        }
        
        // Keyboard shortcuts
        function handleKeyboard(e) {
            if (e.key === "Enter" && document.getElementById("task-input") === document.activeElement) {
                addTask();
            }
        }
        
        // Initialize
        function init() {
            loadData();
            renderLists();
            renderTasks();
            
            // Tailwind script already included
            document.getElementById("task-input").addEventListener("keypress", (e) => {
                if (e.key === "Enter") addTask();
            });
            
            // Close modals when clicking outside
            document.getElementById("edit-modal").addEventListener("click", function(e) {
                if (e.target === this) closeEditModal();
            });
            
            document.getElementById("new-list-modal").addEventListener("click", function(e) {
                if (e.target === this) closeNewListModal();
            });
            
            console.log("%c✅ TaskFlow To-Do App Loaded Successfully!", "color: #8b5cf6; font-size: 14px; font-weight: 600");
        }
        
        // Start the app
        window.onload = init;
    </script>
</body>
</html>
